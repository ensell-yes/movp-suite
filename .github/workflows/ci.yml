name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:supabase-cli-pins
      - run: pnpm check:docs
      - run: pnpm build
      - run: pnpm typecheck

  c7-editor-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @movp/editor-sdk test

  schema-codegen-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @movp/core-schema --filter @movp/codegen test
      - run: pnpm codegen
      - run: git diff --exit-code

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @movp/core-schema --filter @movp/codegen build
      - run: pnpm docs:manifest
      - run: pnpm docs:reference
      - run: pnpm check:docs-freshness
      - run: pnpm check:docs-manifest
      - run: pnpm docs:build

  c6-productization:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.9.2 }
      - uses: supabase/setup-cli@v2
        with: { version: 2.109.1 }
      - run: deno --version | head -n 1 | grep -qF 'deno 2.9.2'
      - run: supabase --version | grep -qF '2.109.1'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @movp/platform test
      - run: bash fixtures/platform-consumer/gate.sh
      - run: pnpm --filter @movp/cli test:built-runtime
      - name: Check schema-aware Edge Function graphs
        run: |
          deno check --no-lock --config supabase/functions/flows/deno.json supabase/functions/flows/index.ts
          deno check --no-lock --config supabase/functions/graphql/deno.json supabase/functions/graphql/index.ts
          deno check --no-lock --config supabase/functions/index-embeddings/deno.json supabase/functions/index-embeddings/index.ts
          deno check --no-lock --config supabase/functions/mcp/deno.json supabase/functions/mcp/index.ts
          deno check --no-lock --config supabase/functions/segment-recompute/deno.json supabase/functions/segment-recompute/index.ts
      - run: bash fixtures/verdaccio-crm-lite/gate.sh

  c6-surface-wiring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Run schema-derived domain registry gate
        run: pnpm --filter @movp/domain exec vitest run --config vitest.unit.config.ts
      - name: Run flow schema-injection gate
        run: pnpm --filter @movp/flows exec vitest run test/schema-injection.test.ts
      - name: Run complete surface-wiring gate
        run: pnpm --filter @movp/mcp exec vitest run test/surface-wiring.test.ts
      - name: Run project-codegen refusal gate
        run: pnpm --filter @movp/cli exec vitest run test/codegen-refusal.test.ts

  metadata-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - uses: supabase/setup-cli@v2
        with: { version: 2.109.1 }
      - run: supabase --version | grep -qF '2.109.1'
      - run: pnpm install --frozen-lockfile
      - run: supabase start
      - run: supabase db reset
      - run: pnpm gate:metadata-consistency

  package-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm check:packages
      - run: pnpm check:release-preflight

  template-gallery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter create-movp build
      - run: pnpm exec tsx scripts/check-template-gallery.ts
      - run: bash scripts/check-template-gallery-guards.sh

  pack-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: bash fixtures/verdaccio-gallery/pack.sh ./artifacts
      - uses: actions/upload-artifact@v4
        with: { name: movp-tarballs, path: ./artifacts }

  template-smoke:
    needs: [pack-artifacts]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: [crm-lite, marketing-site, support-desk, knowledge-base]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - uses: supabase/setup-cli@v2
        with: { version: 2.109.1 }
      - run: supabase --version | grep -qF '2.109.1'
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.9.2 }
      - run: deno --version | head -n 1 | grep -qF 'deno 2.9.2'
      - uses: actions/download-artifact@v5
        with: { name: movp-tarballs, path: ./artifacts }
      - run: pnpm install --frozen-lockfile
      - env:
          ARTIFACTS_DIR: ${{ github.workspace }}/artifacts
        run: bash fixtures/verdaccio-gallery/gate.sh ${{ matrix.template }}

  publishable-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # This dependency-free gate must remain runnable before packages are built.
      - run: pnpm test:version-gate
      - run: pnpm check:publishable-versions
      - run: pnpm check:ci-wiring

  quickstart:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - uses: supabase/setup-cli@v2
        with: { version: 2.109.1 }
      - run: pnpm install --frozen-lockfile
      - run: pnpm bootstrap -- --ci --skip-frontend
      - run: pnpm --filter @movp/frontend-astro exec playwright install --with-deps chromium
      - run: pnpm --filter @movp/frontend-astro e2e:gotrue
      - run: pnpm --filter @movp/frontend-astro e2e login

  boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: node --test scripts/test/check-boundary.test.mjs
      - run: bash scripts/check-boundary.sh

  definer-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: node scripts/check-definer-audit.mjs

  event-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: node scripts/check-event-catalog.mjs

  forward-only-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - run: node scripts/check-forward-only-migrations.mjs

  migration-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: supabase/setup-cli@v2
        with: { version: 2.109.1 }
      - run: supabase start
      - run: supabase db reset
      - run: supabase db diff

  internal-access:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: supabase/setup-cli@v2
        with: { version: 2.109.1 }
      - run: supabase start
      - run: supabase test db

  vector-scale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: supabase/setup-cli@v2
        with: { version: 2.109.1 }
      - run: supabase start
      - run: supabase db reset
      - run: node scripts/check-vector-scale.mjs

  integration-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - uses: supabase/setup-cli@v2
        with: { version: 2.109.1 }
      - run: node --test scripts/integration-smoke-http.test.mjs
      - run: supabase start
      - run: supabase db reset
      - name: Serve functions and run integration smoke
        run: |
          eval "$(supabase status -o env | sed 's/^\([A-Z_]*\)=/export \1=/')"
          printf 'MOVP_JWT_ISSUER=%s/auth/v1\n' "$API_URL" >/tmp/integration-smoke-functions.env
          supabase functions serve --env-file /tmp/integration-smoke-functions.env >/tmp/integration-smoke-functions.log 2>&1 &
          ready=0
          for _ in $(seq 1 20); do
            status="$(curl -sS -o /dev/null -w '%{http_code}' -X POST "$API_URL/functions/v1/auth-exchange" \
              -H "apikey: $ANON_KEY" -H 'Authorization: Bearer invalid' -H 'content-type: application/json' -d '{}' || true)"
            if [ "$status" = '401' ]; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            tail -n 100 /tmp/integration-smoke-functions.log || true
            exit 1
          fi
          if ! node scripts/check-integration-smoke.mjs; then
            tail -n 100 /tmp/integration-smoke-functions.log || true
            exit 1
          fi

  integration-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: node scripts/check-integration-templates.mjs

  graphql-shape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:graphql-shape

  jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:jobs

  redaction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:redaction

  frontend-ux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @movp/frontend-astro build
      - run: pnpm --filter @movp/frontend-astro test
      - run: pnpm --filter @movp/frontend-astro exec playwright install --with-deps chromium
      - run: pnpm --filter @movp/frontend-astro e2e

  slice-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - uses: supabase/setup-cli@v2
        with: { version: 2.109.1 }
      - run: pnpm install --frozen-lockfile
      - run: supabase start
      - name: Run full slice e2e
        run: |
          pkill -f 'supabase.*functions serve|edge-runtime' || true
          bash scripts/slice-e2e.sh
      - name: Upload edge function logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: slice-e2e-function-logs
          path: /tmp/movp-functions.log
          if-no-files-found: ignore
