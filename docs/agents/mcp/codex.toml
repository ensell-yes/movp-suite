# ~/.codex/config.toml — MOVP MCP over native streamable HTTP.
# Codex sends the value of `bearer_token_env_var` as the Bearer token. Load
# MOVP_PAT from a credential store without putting its value in shell history.

[mcp_servers.movp]
url = "https://your-project-ref.supabase.co/functions/v1/mcp"
bearer_token_env_var = "MOVP_PAT"
